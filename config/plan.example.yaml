# Copy to config/plan.yaml and customize.
#
#   ./scripts/init_local.sh
#   # or: cp config/plan.example.yaml config/plan.yaml
#
# Used by notebooks/03_debt_plan.ipynb and plan-vs-actual in 01_budget_analysis.ipynb.
# plan.yaml is git-ignored — your numbers stay local.

income:
  monthly_take_home: 4800   # default when income.phases is omitted
  bonus_net: 0              # optional lump-sum (after tax), e.g. 10560
  bonus_month: 2            # which month of the plan it arrives (1 = first month)
  # Optional: raise or job change mid-plan
  # phases:
  #   - months: 1            # month 1 at old pay
  #     monthly_take_home: 4800
  #   - monthly_take_home: 7336   # remaining months at new pay

# Default monthly budget lines (scenarios can override lifestyle / EF).
budget:
  essentials: 2710      # rent, insurance, phone, groceries, fuel, etc.
  lifestyle: 720        # dining, alcohol, entertainment, shopping
  emergency_fund: 1000  # monthly contribution until target is reached

# Map transaction categories → plan buckets for plan-vs-actual (notebook 01).
budget_mapping:
  essentials:
    - Groceries
    - Utilities
    - Insurance
    - Housing
    - Fuel
    - Transport
    - Auto
    - Health
    - Software & Subscriptions
    - Fees
  lifestyle:
    - Dining
    - Alcohol
    - Entertainment
    - Shopping
    - Recreation
    - Travel

emergency_fund:
  current: 0
  target: 11000         # ~3 months of essentials

# Debts are paid avalanche-style (highest APR first).
debts:
  - name: Credit Card
    balance: 5000
    apr: 19.99

  - name: Line of Credit
    balance: 15000
    apr: 6.5

# Where a bonus goes: debt | emergency_fund | split
bonus_to: debt

scenarios:
  - name: Balanced
    # Uses default budget lines above.

  - name: Lean lifestyle
    lifestyle: 400
    emergency_fund: 1000

  - name: Sprint then reassess
    bonus_to: split
    phases:
      - months: 5
        lifestyle: 250
        emergency_fund: 1000
      # After 5 months, falls back to default budget lines for the remaining debt.

  - name: Safety net first
    lifestyle: 500
    emergency_fund: 1200
    bonus_to: emergency_fund
